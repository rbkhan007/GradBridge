# =============================================================================
# GradBridge — Production Docker Compose stack.
# =============================================================================
# Services:
#   postgres       — PostgreSQL 16 + pgvector
#   pgadmin        — pgAdmin4 web UI for database management
#   redis          — cache + session backend
#   prisma-migrate — one-shot init: prisma db push + seed
#   web            — Next.js standalone production server
#   cloudflared    — Cloudflare Tunnel (public access)
#
# Usage:
#   docker compose up -d --build       # start everything
#   docker compose logs -f web         # watch web logs
#   docker compose down                # stop all
#   docker compose down -v             # stop + delete volumes (fresh start)
#
# Access:
#   Web app:  http://localhost:3000 (local) or https://yourdomain.com (via tunnel)
#   pgAdmin:  http://localhost:5050  (email: admin@gradbridge.com, password: admin)
#   Postgres: localhost:5432
# =============================================================================

services:
  # ---------------------------------------------------------------------------
  # PostgreSQL 16 + pgvector
  # ---------------------------------------------------------------------------
  postgres:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    stdin_open: true
    tty: true
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-gradbridge}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-gradbridge}
      POSTGRES_DB: ${POSTGRES_DB:-gradbridge}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-gradbridge} -d ${POSTGRES_DB:-gradbridge}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    ports:
      - "5432:5432"
    networks:
      - gradbridge

  # ---------------------------------------------------------------------------
  # pgAdmin4 — database management UI
  # ---------------------------------------------------------------------------
  pgadmin:
    image: dpage/pgadmin4:latest
    restart: unless-stopped
    stdin_open: true
    tty: true
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL:-admin@gradbridge.com}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD:-admin}
      PGADMIN_LISTEN_PORT: 5050
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    ports:
      - "5050:5050"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - gradbridge

  # ---------------------------------------------------------------------------
  # Redis 7 — cache + session backend
  # ---------------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    stdin_open: true
    tty: true
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s
    networks:
      - gradbridge

  # ---------------------------------------------------------------------------
  # prisma-migrate — one-shot init container
  # ---------------------------------------------------------------------------
  prisma-migrate:
    build:
      context: .
      dockerfile: Dockerfile
      target: migrator
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-gradbridge}:${POSTGRES_PASSWORD:-gradbridge}@postgres:5432/${POSTGRES_DB:-gradbridge}?schema=public
      NEON_AUTH_BASE_URL: ${NEON_AUTH_BASE_URL:-}
      NEON_AUTH_COOKIE_SECRET: ${NEON_AUTH_COOKIE_SECRET:-change-me}
      NODE_ENV: production
    stdin_open: true
    tty: true
    restart: "no"
    networks:
      - gradbridge

  # ---------------------------------------------------------------------------
  # web — Next.js standalone production server
  # ---------------------------------------------------------------------------
  web:
    build:
      context: .
      dockerfile: Dockerfile
      target: runner
    restart: unless-stopped
    stdin_open: true
    tty: true
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      prisma-migrate:
        condition: service_completed_successfully
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-gradbridge}:${POSTGRES_PASSWORD:-gradbridge}@postgres:5432/${POSTGRES_DB:-gradbridge}?schema=public
      REDIS_URL: redis://redis:6379
      NEON_AUTH_BASE_URL: ${NEON_AUTH_BASE_URL:-}
      NEON_AUTH_COOKIE_SECRET: ${NEON_AUTH_COOKIE_SECRET:-change-me}
      NODE_ENV: production
      ZAI_API_KEY: ${ZAI_API_KEY:-}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      OPENROUTER_MODEL: ${OPENROUTER_MODEL:-deepseek/deepseek-coder}
      OPENROUTER_FALLBACK_KEY: ${OPENROUTER_FALLBACK_KEY:-}
      GROQ_API_KEY: ${GROQ_API_KEY:-}
      GROQ_MODEL: ${GROQ_MODEL:-llama-3.3-70b-versatile}
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-}
      OLLAMA_MODEL: ${OLLAMA_MODEL:-}
    ports:
      - "3000:3000"
    networks:
      - gradbridge

  # ---------------------------------------------------------------------------
  # cloudflared — Cloudflare Tunnel (public access via Zero Trust)
  # ---------------------------------------------------------------------------
  cloudflared:
    image: cloudflare/cloudflared:latest
    restart: unless-stopped
    command: tunnel run
    environment:
      TUNNEL_TOKEN: ${CLOUDFLARE_TUNNEL_TOKEN:-}
    depends_on:
      web:
        condition: service_started
    networks:
      - gradbridge
    profiles:
      - tunnel  # only starts with: docker compose --profile tunnel up -d

volumes:
  pgdata:
    driver: local
  pgadmin_data:
    driver: local
  redisdata:
    driver: local

networks:
  gradbridge:
    driver: bridge
